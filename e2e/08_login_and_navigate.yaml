appId: com.vocairo
---
- launchApp:
    clearState: true

# Wait for sign in screen
- extendedWaitUntil:
    visible: "Sign In"
    timeout: 15000
- takeScreenshot: 08_01_signin_screen

# Enter credentials
- tapOn: "Enter your email"
- inputText: "test@vocairo.com"
- tapOn: "Enter your password"
- inputText: "Test123!"
- hideKeyboard
- takeScreenshot: 08_02_credentials_entered

# Tap Sign In
- tapOn:
    text: "Sign In"
    index: 0
- extendedWaitUntil:
    notVisible: "Enter your email"
    timeout: 20000
- waitForAnimationToEnd
- takeScreenshot: 08_03_after_login
