appId: com.vocairo
---
- launchApp
- waitForAnimationToEnd

# Navigate to Settings (if logged in)
- tapOn:
    text: '.*Settings.*'
    optional: true
- waitForAnimationToEnd
- takeScreenshot: 05_settings_screen

# Check for settings sections
- assertVisible:
    text: '.*Appearance.*'
    optional: true
- assertVisible:
    text: '.*Dark Mode.*'
    optional: true
- assertVisible:
    text: '.*Legal.*'
    optional: true
- assertVisible:
    text: '.*Privacy Policy.*'
    optional: true
- assertVisible:
    text: '.*Terms of Service.*'
    optional: true

# Check pricing link
- assertVisible:
    text: '.*Pricing.*'
    optional: true

# Check danger zone
- scrollUntilVisible:
    element:
      text: '.*Danger Zone.*'
    direction: DOWN
    timeout: 5000
- takeScreenshot: 05_settings_bottom
